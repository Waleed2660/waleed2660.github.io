name: Update GitHub Stats

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3am UTC
  workflow_dispatch:       # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch GitHub stats and write JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          token = os.environ['GH_TOKEN']
          headers = {'Authorization': f'Bearer {token}', 'User-Agent': 'github-actions'}

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          user = get('https://api.github.com/users/Waleed2660')
          repos = get('https://api.github.com/users/Waleed2660/repos?per_page=100&sort=updated')

          own = [r for r in repos if not r.get('fork')]
          stars = sum(r.get('stargazers_count', 0) for r in own)

          lang_count = {}
          for r in own:
              lang = r.get('language')
              if lang:
                  lang_count[lang] = lang_count.get(lang, 0) + 1

          total = sum(lang_count.values()) or 1
          sorted_langs = sorted(lang_count.items(), key=lambda x: -x[1])[:5]
          languages = [
              {'name': l, 'percentage': round(c / total * 100)}
              for l, c in sorted_langs
          ]

          output = {
              'followers': user['followers'],
              'public_repos': user['public_repos'],
              'stars': stars,
              'languages': languages
          }

          with open('public/github-stats.json', 'w') as f:
              json.dump(output, f, indent=2)

          print('Written:', json.dumps(output, indent=2))
          EOF

      - name: Commit updated stats
        env:
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
        run: |
          git config user.name "Waleed2660"
          git config user.email "$GIT_EMAIL"
          git add public/github-stats.json
          git diff --staged --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
