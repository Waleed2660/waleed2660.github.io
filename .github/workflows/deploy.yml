name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit count
        id: commits
        run: |
          COUNT=$(curl -s -I "https://api.github.com/repos/${{ github.repository }}/commits?per_page=1" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | grep -i '^link:' | grep -oP 'page=\K[0-9]+(?=>; rel="last")' || echo "1")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GIT_COMMIT_COUNT: ${{ steps.commits.outputs.count }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
