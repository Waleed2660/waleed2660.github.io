<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
    }
    
    .og-card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Glass card effect */
    .content {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 80px 100px;
      text-align: center;
      position: relative;
      z-index: 10;
    }
    
    /* Floating particles */
    .particle {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.2;
      animation: float 15s infinite ease-in-out;
    }
    
    .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 3px; height: 3px; left: 80%; top: 30%; animation-delay: 2s; }
    .particle:nth-child(3) { width: 5px; height: 5px; left: 50%; top: 60%; animation-delay: 4s; }
    .particle:nth-child(4) { width: 3px; height: 3px; left: 20%; top: 70%; animation-delay: 1s; }
    .particle:nth-child(5) { width: 4px; height: 4px; left: 90%; top: 50%; animation-delay: 3s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); opacity: 0.2; }
      50% { transform: translateY(-20px); opacity: 0.4; }
    }
    
    h1 {
      font-size: 96px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
      text-shadow: 0 0 40px rgba(147, 197, 253, 0.5);
      letter-spacing: -2px;
    }
    
    .role {
      font-size: 42px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      margin-bottom: 30px;
    }
    
    .location {
      font-size: 32px;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .tech-badges {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 16px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <!-- Background particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <div class="content">
      <h1>Waleed Tariq</h1>
      <div class="role">Software Engineer @ Sainsbury's</div>
      <div class="location">
        <span>📍</span>
        <span>Manchester, UK</span>
      </div>
      <div class="tech-badges">
        <div class="badge">Java</div>
        <div class="badge">Spring Boot</div>
        <div class="badge">Kubernetes</div>
        <div class="badge">AWS</div>
      </div>
    </div>
  </div>
</body>
</html>
